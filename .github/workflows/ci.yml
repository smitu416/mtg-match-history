# ==========================================
# GitHub Actions CI（継続的インテグレーション）設定
# ==========================================
# このファイルは「コードをpushしたとき・PRを作ったときに
# 自動でテストやビルドを実行する」設定。
#
# CI（継続的インテグレーション）とは、
# コードをGitHubにpushするたびに自動でテストを実行し、
# 壊れた変更が混入するのを防ぐ仕組み。

# このワークフローの名前（GitHubのActionsタブに表示される）
name: CI

# ===================================
# いつ実行するか
# ===================================
on:
  # mainブランチへのpush時に実行
  push:
    branches:
      - main
      - develop
  # Pull Requestが作成・更新されたときに実行
  pull_request:
    branches:
      - main
      - develop

# ===================================
# 実行するジョブ（作業）の定義
# ===================================
jobs:
  # -----------------------------------
  # CIジョブ: Lint・テスト・ビルドを実行
  # -----------------------------------
  ci:
    # Ubuntu Linux 上で実行する（GitHub が提供する無料の仮想環境）
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードをチェックアウト（ダウンロード）する
      - name: コードを取得
        uses: actions/checkout@v4

      # Node.js をセットアップする
      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'         # Node.js のバージョン
          cache: 'npm'               # npm のキャッシュを使って高速化

      # 依存パッケージをインストールする
      # npm ci は package-lock.json に従って完全にクリーンインストールする
      - name: パッケージをインストール
        run: npm ci

      # ESLint でコードの問題をチェックする
      # ESLint とは「コードの書き方が正しいかチェックするツール」
      - name: Lint チェック
        run: npm run lint

      # テストを実行する
      - name: テストを実行
        run: npm run test

      # ビルドが成功するか確認する
      # ビルドとは「開発用コードを本番用に変換すること」
      - name: ビルド確認
        run: npm run build
